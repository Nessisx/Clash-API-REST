<!doctype html>
<html lang="es">
  <!-- Realizado por Nelson Sierra y Joseph De la Rans -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CR / CARDS</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ── HEADER ──────────────────────────────────────────────── -->
    <header>
      <div>
        <h1>Cartas<span>de Clash</span></h1>
      </div>
      <div class="h-right">
        <div class="h-count" id="count">—</div>
        <div class="h-count-label">Cartas Totales</div>
      </div>
    </header>

    <!-- ── CONTROLS ────────────────────────────────────────────── -->
    <div class="controls">
      <!-- Filtro de rareza -->
      <div class="ctrl-section">
        <span class="ctrl-label">Rareza</span>
        <button class="pill active" data-r="all">Todas</button>
        <button class="pill" data-r="Common">Común</button>
        <button class="pill" data-r="Rare">Rara</button>
        <button class="pill" data-r="Epic">Épica</button>
        <button class="pill" data-r="Legendary">Legendaria</button>
        <button class="pill" data-r="Champion">Campeón</button>
      </div>

      <!-- Filtro de tipo -->
      <div class="ctrl-section">
        <span class="ctrl-label">Tipo</span>
        <button class="pill active" data-t="all">Todos</button>
        <button class="pill" data-t="Troop">Tropa</button>
        <button class="pill" data-t="Building">Estructura</button>
        <button class="pill" data-t="Spell">Hechizo</button>
      </div>

      <!-- Buscar + Ordenar -->
      <div class="ctrl-section">
        <div class="search-wrap">
          <input
            type="search"
            id="search"
            placeholder="Buscar cartas…"
            autocomplete="off"
          />
        </div>
        <div class="sort-wrap">
          <select id="sort">
            <option value="name">Nombre</option>
            <option value="elixir">Elixir ↑</option>
            <option value="elixir-d">Elixir ↓</option>
            <option value="arena">Arena</option>
          </select>
        </div>
      </div>
    </div>

    <div id="loading">Cargando cartas <span class="blink"></span></div>
    <div id="empty">No se encontraron cartas</div>
    <div id="card-grid"></div>

    <!-- ── MODAL ───────────────────────────────────────────────── -->
    <div id="overlay">
      <div class="modal">
        <button class="modal-close" id="close">✕</button>
        <div class="modal-top">
          <div class="modal-img-col">
            <img id="m-img" alt="" />
          </div>
          <div class="modal-info-col">
            <div class="modal-eyebrow" id="m-eye"></div>
            <div class="modal-name" id="m-name"></div>
            <div class="modal-tags" id="m-tags"></div>
          </div>
        </div>
        <div class="modal-desc-wrap">
          <p class="modal-desc" id="m-desc"></p>
        </div>
        <div class="modal-stats" id="m-stats"></div>
      </div>
    </div>

    <!-- ── FOOTER ── -->
    <!-- Realizado por Nelson Sierra y Joseph De la Rans -->
    <footer>
      <p>
        Realizado por Nelson Sierra y Joseph De la Rans —
        <a href="https://github.com/RoyaleAPI/cr-api-data" target="_blank"
          >RoyaleAPI/cr-api-data</a
        >
      </p>
    </footer>

    <!-- Logic -->
    <script src="app.js"></script>
  </body>
</html>
